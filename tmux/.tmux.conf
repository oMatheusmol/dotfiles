# Terminal colors
set -ga terminal-overrides ",xterm-256color*:Tc"
set-option -g default-terminal "xterm-256color"
set -s escape-time 0

# Prefix: C-a instead of C-b
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Status bar
set -g status-style 'bg=#1c1c1c fg=#96a6c8'
set -g status-left '#[fg=#73c936,bold] [#S] '
set -g status-left-length 20
set -g status-right '#[fg=#ffdd33] %H:%M #[fg=#8f8f8f]%d/%m '
set -g status-right-length 40
set-window-option -g window-status-current-style 'fg=#ffdd33 bold'

# Windows start at 1
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Vim-like pane navigation
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R
bind -r ^ last-window

# Vim-like pane resizing
bind -r K resize-pane -U 5
bind -r J resize-pane -D 5
bind -r H resize-pane -L 5
bind -r L resize-pane -R 5

# Split panes keeping current path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window keeping current path (n = "new"; overrides default next-window on prefix+n)
bind c new-window -c "#{pane_current_path}"
bind n new-window -c "#{pane_current_path}"

# Copy mode (vi)
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Clipboard: WSL vs macOS
if-shell "uname -r | grep -q microsoft" \
    "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'clip.exe'" \
    "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'"

# Sessionizer (fzf project switcher)
bind-key -r f run-shell "tmux neww tmux-sessionizer"

# Open TODO in nvim
bind -r D neww -c "#{pane_current_path}" "[[ -e TODO.md ]] && nvim TODO.md || nvim ~/.dotfiles/TODO.md"

# Cheatsheet
bind-key -r i run-shell "tmux neww tmux-cht.sh"

# Mouse support
set -g mouse on
